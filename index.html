<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍎 Три в ряд</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="toast" id="toast">✅ Готово!</div>

    <!-- ===== АВТОРИЗАЦИЯ ===== -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-box">
            <h2 id="authTitle">🍎 Три в ряд</h2>
            <div class="auth-error" id="authError"></div>
            <div class="auth-success" id="authSuccess"></div>
            <div id="authExtraFields"></div>
            <button class="auth-btn-login" id="authSubmitBtn">Войти</button>
            <div class="auth-toggle" id="authToggle">Нет аккаунта? Регистрация</div>
        </div>
    </div>

    <!-- ===== МЕНЮ (Gardenscapes стиль) ===== -->
    <div class="game" id="menuContainer" style="display:none;">
        <button class="back-btn" id="backBtn">🏠 На главную</button>
        
        <div class="header">
            🍎 ТРИ В РЯД
            <span class="sub">👤 <span id="userNameDisplay">Гость</span></span>
        </div>

        <!-- Верхняя панель -->
        <div class="menu-top">
            <div class="menu-stats">
                <div class="menu-stat">
                    <span class="icon">⭐</span>
                    <span id="starsCount">0</span>
                </div>
                <div class="menu-stat">
                    <span class="icon">⚡</span>
                    <span id="energyCount">5</span>
                    <span class="sub-text">/5</span>
                </div>
                <div class="menu-stat">
                    <span class="icon">💡</span>
                    <span id="hintCount">3</span>
                </div>
            </div>
            
            <div class="level-progress">
                <div class="level-info">
                    <span id="levelDisplay">Уровень 1</span>
                    <span id="levelProgressText">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="levelProgress" style="width:0%"></div>
                </div>
            </div>
        </div>

        <!-- Уровни -->
        <div class="levels-grid" id="levelsContainer"></div>

        <!-- Кнопки действий -->
        <div class="menu-actions">
            <button class="menu-btn primary" id="playBtn">🎮 Играть</button>
            <button class="menu-btn hint" id="hintBtn">💡 Подсказка</button>
            <button class="menu-btn daily" id="dailyBtn">🎁 Ежедневная награда</button>
            <button class="menu-btn reset" id="resetMenuBtn">🔄 Сброс</button>
        </div>

        <div class="footer" id="menuStatus">🏡 Добро пожаловать в игру!</div>
    </div>

    <!-- ===== ИГРА ===== -->
    <div class="game" id="gameContainer" style="display:none;">
        <button class="back-btn" id="gameBackBtn">🏠 Меню</button>
        <div class="header">
            <span id="gameTitle">🎮 Уровень 1</span>
            <span class="sub">🎯 <span id="targetScore">Цель: 30</span></span>
        </div>
        <div class="stats">
            <div class="stat-item">🏆 Очки <span id="score">0</span></div>
            <div class="stat-item">👆 Ходов <span id="moves">0/20</span></div>
            <div class="stat-item">🏅 Рекорд <span id="highScore">0</span></div>
        </div>
        <div class="grid-wrap">
            <div class="grid" id="grid"></div>
            <div class="game-over" id="gameOver">
                <div class="go-text" id="goText">💀 ПОРАЖЕНИЕ</div>
                <div class="go-score" id="goScore">Очки: 0</div>
                <button class="go-btn" id="restartBtn">🔄 Ещё раз</button>
            </div>
        </div>
        <div class="btn-row">
            <button class="btn gold" id="newGameBtn">🔄 Новая игра</button>
            <button class="btn blue" id="shuffleBtn">🔀 Перемешать</button>
            <button class="btn red" id="resetBtn">🗑️ Сброс</button>
        </div>
        <div class="footer" id="statusMsg">🍎 Собирай комбинации из 3+ фруктов!</div>
    </div>

    <script src="data.js"></script>
    <script src="auth.js"></script>
    <script src="animations.js"></script>
    <script src="game.js"></script>
    <script src="menu.js"></script>
    <script>
        // ================================================================
        //  ЗАПУСК
        // ================================================================

        const user = getCurrentUser();
        if (user) {
            document.getElementById('authOverlay').classList.add('hidden');
            document.getElementById('userNameDisplay').textContent = user;
            loadMenu();
        } else {
            document.getElementById('menuContainer').style.display = 'none';
            showAuthScreen('register');
        }

        // Кнопка назад в игре
        document.getElementById('gameBackBtn').addEventListener('click', () => {
            if (isProcessing) return;
            document.getElementById('gameContainer').style.display = 'none';
            document.getElementById('menuContainer').style.display = 'block';
            updateMenuUI();
            updateLevelDisplay();
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            document.getElementById('gameOver').classList.remove('active');
            startGame();
        });

        console.log('🍎 Три в ряд с меню загружена!');
    </script>
</body>
</html>
