<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🍎 Три в ряд</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===== ПОЛНОЭКРАННЫЙ РЕЖИМ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a1a;
            touch-action: none;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 0;
            margin: 0;
            background: #0a0a1a;
        }
        .game {
            width: 100%;
            height: 100%;
            max-width: 500px;
            max-height: 900px;
            background: linear-gradient(145deg, #1a2a3a, #0f1a2a);
            border-radius: 0;
            padding: 10px;
            border: none;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }
        /* На больших экранах — скругление */
        @media (min-width: 500px) {
            .game {
                border-radius: 30px;
                border: 2px solid rgba(255,215,0,0.15);
                box-shadow: 0 20px 60px rgba(0,0,0,.8);
                min-height: 90vh;
                max-height: 95vh;
            }
        }
        /* ===== ОСТАЛЬНЫЕ СТИЛИ ===== */
        .header {
            color: #ffd700;
            font-size: clamp(16px, 4vw, 24px);
            font-weight: 700;
            text-align: center;
            padding: 4px 0;
            text-shadow: 0 0 40px rgba(255,215,0,0.15);
            letter-spacing: 2px;
            flex-shrink: 0;
        }
        .header .sub {
            font-size: clamp(8px, 2vw, 12px);
            color: #6a8a8a;
            letter-spacing: 4px;
            font-weight: 300;
            display: block;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 4px;
            background: rgba(15,26,42,0.5);
            padding: 6px 10px;
            border-radius: 14px;
            margin-bottom: 6px;
            border: 1px solid rgba(255,215,0,0.08);
            flex-shrink: 0;
        }
        .stat-item {
            color: #c0d0e8;
            font-weight: 700;
            font-size: clamp(8px, 1.8vw, 11px);
            text-align: center;
        }
        .stat-item span {
            color: #ffd700;
            font-size: clamp(14px, 3.5vw, 20px);
            display: block;
        }
        .grid-wrap {
            flex: 1;
            min-height: 0;
            width: 100%;
            aspect-ratio: 1/1;
            max-width: 100%;
            margin: 4px auto;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(10,20,30,0.6);
            border: 2px solid rgba(255,215,0,0.08);
            position: relative;
            touch-action: none;
        }
        .grid {
            display: grid;
            gap: 4px;
            padding: 6px;
            width: 100%;
            height: 100%;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            touch-action: none;
        }
        .cell {
            background: rgba(30,50,70,0.4);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(18px, 5vw, 32px);
            cursor: pointer;
            transition: all .15s ease;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            touch-action: none;
            aspect-ratio: 1;
        }
        .cell:active {
            transform: scale(.9);
        }
        .cell.selected {
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.2);
            transform: scale(1.05);
            z-index: 2;
        }
        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin: 6px 0;
            flex-shrink: 0;
        }
        .btn {
            background: rgba(15,26,42,0.6);
            color: #c0d0e8;
            border: 1px solid rgba(255,215,0,0.1);
            padding: clamp(6px, 1.5vw, 10px);
            border-radius: 12px;
            font-size: clamp(8px, 1.8vw, 12px);
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            text-align: center;
        }
        .btn:active {
            transform: scale(.95);
        }
        .btn.gold {
            border-color: rgba(255,215,0,0.3);
            color: #ffd700;
        }
        .btn.red {
            border-color: rgba(170,90,90,0.3);
            color: #f0d0d0;
        }
        .btn.blue {
            border-color: rgba(74,106,154,0.3);
            color: #6a9aca;
        }
        .footer {
            color: #4a6a6a;
            text-align: center;
            font-size: clamp(6px, 1.4vw, 9px);
            margin-top: 4px;
            letter-spacing: 1px;
            flex-shrink: 0;
        }
        .footer.error {
            color: #ff6b6b;
        }
        .toast {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,.9);
            color: #ffd700;
            padding: 6px 18px;
            border-radius: 14px;
            font-size: clamp(10px, 2.5vw, 16px);
            font-weight: 700;
            z-index: 999;
            border: 1px solid rgba(255,215,0,0.2);
            opacity: 0;
            transition: opacity .3s;
            pointer-events: none;
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.error {
            border-color: rgba(255,100,100,0.3);
            color: #ff6b6b;
        }
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,.85);
            border-radius: 14px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 16px;
            backdrop-filter: blur(10px);
        }
        .game-over.active {
            display: flex;
        }
        .game-over .go-text {
            color: #ff6b6b;
            font-size: clamp(24px, 6vw, 40px);
            font-weight: 700;
            text-align: center;
        }
        .game-over .go-text.win {
            color: #ffd700;
        }
        .game-over .go-score {
            color: #c0d0e8;
            font-size: clamp(12px, 3vw, 18px);
            margin: 3px 0;
            text-align: center;
        }
        .game-over .go-score span {
            color: #ffd700;
            font-weight: 700;
        }
        .game-over .go-btn {
            background: linear-gradient(145deg, #3a8a3a, #2a6a2a);
            color: #f0f7d0;
            border: none;
            padding: clamp(8px, 2vw, 14px) clamp(20px, 5vw, 40px);
            border-radius: 14px;
            font-size: clamp(12px, 3vw, 18px);
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
            border: 1px solid rgba(90,170,90,0.3);
        }
        .game-over .go-btn:active {
            transform: scale(.95);
        }
        .back-btn {
            background: rgba(74,42,42,0.4);
            color: #f0d0d0;
            border: none;
            padding: 4px;
            border-radius: 10px;
            font-size: clamp(8px, 1.8vw, 11px);
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 4px;
            border: 1px solid rgba(106,58,58,0.2);
            width: 100%;
            flex-shrink: 0;
        }
        .back-btn:active {
            transform: scale(.95);
        }
        /* ===== МЕНЮ ===== */
        .menu-top {
            background: rgba(15,26,42,0.5);
            border-radius: 14px;
            padding: 8px 10px;
            margin-bottom: 6px;
            border: 1px solid rgba(255,215,0,0.08);
            flex-shrink: 0;
        }
        .menu-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 4px;
            margin-bottom: 6px;
        }
        .menu-stat {
            background: rgba(10,20,30,0.4);
            border-radius: 10px;
            padding: 4px;
            text-align: center;
            color: #c0d0e8;
            font-size: clamp(9px, 2vw, 13px);
        }
        .menu-stat .icon {
            font-size: clamp(12px, 2.5vw, 18px);
        }
        .menu-stat .sub-text {
            font-size: clamp(6px, 1.2vw, 9px);
            color: #4a6a6a;
        }
        .level-progress {
            background: rgba(10,20,30,0.3);
            border-radius: 10px;
            padding: 4px 8px;
        }
        .level-info {
            display: flex;
            justify-content: space-between;
            color: #c0d0e8;
            font-size: clamp(8px, 1.8vw, 12px);
            margin-bottom: 2px;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            border-radius: 4px;
            transition: width 0.5s;
        }
        .levels-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            margin: 6px 0;
            flex: 1;
            min-height: 0;
            align-content: start;
        }
        .level-item {
            background: rgba(15,26,42,0.4);
            border-radius: 10px;
            padding: 4px 2px;
            text-align: center;
            font-size: clamp(8px, 1.6vw, 12px);
            font-weight: 700;
            color: #4a6a6a;
            border: 1px solid rgba(74,106,154,0.1);
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .level-item.unlocked {
            color: #c0d0e8;
            border-color: rgba(255,215,0,0.15);
            cursor: pointer;
        }
        .level-item.unlocked:hover {
            border-color: #ffd700;
            background: rgba(255,215,0,0.05);
        }
        .level-item.active {
            border-color: #ffd700;
            background: rgba(255,215,0,0.08);
            color: #ffd700;
        }
        .level-item.locked {
            opacity: 0.4;
        }
        .menu-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            margin-top: 4px;
            flex-shrink: 0;
        }
        .menu-btn {
            padding: clamp(6px, 1.5vw, 10px);
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: clamp(8px, 1.8vw, 12px);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .menu-btn:active {
            transform: scale(0.95);
        }
        .menu-btn.primary {
            grid-column: span 2;
            background: linear-gradient(145deg, #3a8a3a, #2a6a2a);
            color: #f0f7d0;
            border: 1px solid rgba(90,170,90,0.3);
            font-size: clamp(12px, 2.5vw, 16px);
            padding: clamp(10px, 2vw, 14px);
        }
        .menu-btn.hint {
            background: rgba(74,106,154,0.3);
            color: #6a9aca;
            border: 1px solid rgba(74,106,154,0.2);
        }
        .menu-btn.daily {
            background: rgba(255,215,0,0.1);
            color: #ffd700;
            border: 1px solid rgba(255,215,0,0.15);
        }
        .menu-btn.reset {
            background: rgba(170,90,90,0.2);
            color: #f0d0d0;
            border: 1px solid rgba(170,90,90,0.15);
        }
        .menu-btn.logout {
            background: rgba(170,90,90,0.3);
            color: #f0d0d0;
            border: 1px solid rgba(170,90,90,0.2);
        }
        /* ===== АВТОРИЗАЦИЯ ===== */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,.92);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(20px);
        }
        .auth-overlay.hidden {
            display: none;
        }
        .auth-box {
            background: linear-gradient(145deg, #1a2a3a, #0f1a2a);
            padding: 25px 20px;
            border-radius: 25px;
            border: 1px solid rgba(255,215,0,0.1);
            max-width: 360px;
            width: 100%;
            box-shadow: 0 0 60px rgba(0,0,0,.5);
            max-height: 90vh;
            overflow-y: auto;
        }
        .auth-box h2 {
            color: #ffd700;
            text-align: center;
            font-size: clamp(18px, 4vw, 26px);
            margin-bottom: 16px;
            letter-spacing: 2px;
        }
        .auth-box .auth-label {
            color: #c0d0e8;
            font-size: clamp(10px, 2vw, 13px);
            font-weight: 700;
            margin: 6px 0 3px 0;
            opacity: 0.7;
        }
        .auth-box input {
            width: 100%;
            padding: 10px 12px;
            margin: 3px 0;
            border-radius: 12px;
            border: 1px solid rgba(255,215,0,0.1);
            background: rgba(15,26,42,0.6);
            color: #c0d0e8;
            font-size: clamp(12px, 2.5vw, 16px);
            outline: 0;
        }
        .auth-box input::placeholder {
            color: #3a5a5a;
        }
        .auth-box input:focus {
            border-color: rgba(255,215,0,0.3);
        }
        .auth-box .gender-row {
            display: flex;
            gap: 12px;
            margin: 4px 0 8px 0;
        }
        .auth-box .gender-btn {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(255,215,0,0.1);
            background: rgba(15,26,42,0.6);
            color: #c0d0e8;
            font-size: clamp(14px, 3vw, 20px);
            cursor: pointer;
            transition: all .2s;
            text-align: center;
        }
        .auth-box .gender-btn:active {
            transform: scale(.95);
        }
        .auth-box .gender-btn.active {
            border-color: #ffd700;
            background: rgba(255,215,0,0.05);
        }
        .auth-box button {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            font-size: clamp(14px, 3vw, 18px);
            cursor: pointer;
            transition: all .2s;
        }
        .auth-box button:active {
            transform: scale(.95);
        }
        .auth-btn-login {
            background: linear-gradient(145deg, #3a8a3a, #2a6a2a);
            color: #f0f7d0;
        }
        .auth-btn-register {
            background: linear-gradient(145deg, #c49a3a, #8a6a2a);
            color: #1e2a1e;
        }
        .auth-error {
            color: #ff6b6b;
            font-size: clamp(10px, 2vw, 13px);
            text-align: center;
            min-height: 16px;
        }
        .auth-success {
            color: #6fcf6f;
            font-size: clamp(10px, 2vw, 13px);
            text-align: center;
            min-height: 16px;
        }
        .auth-toggle {
            color: #4a6a6a;
            text-align: center;
            font-size: clamp(10px, 2vw, 13px);
            margin-top: 6px;
            cursor: pointer;
        }
        .auth-toggle:hover {
            color: #ffd700;
        }
        /* ===== АДАПТАЦИЯ ПОД ТЕЛЕФОН ===== */
        @media (max-width: 400px) {
            .grid {
                gap: 3px;
                padding: 4px;
            }
            .cell {
                border-radius: 5px;
                font-size: 18px;
            }
            .stats {
                padding: 4px 6px;
            }
            .game {
                padding: 6px;
            }
        }
        @media (max-height: 700px) {
            .header {
                font-size: 14px;
                padding: 2px 0;
            }
            .header .sub {
                font-size: 8px;
            }
            .stats {
                padding: 4px 6px;
            }
            .stat-item {
                font-size: 7px;
            }
            .stat-item span {
                font-size: 12px;
            }
            .grid {
                gap: 3px;
                padding: 4px;
            }
            .cell {
                font-size: 18px;
            }
            .menu-stats {
                margin-bottom: 3px;
            }
            .menu-stat {
                padding: 2px;
                font-size: 8px;
            }
            .level-item {
                font-size: 7px;
                padding: 2px;
            }
            .menu-btn {
                padding: 4px;
                font-size: 8px;
            }
            .btn {
                padding: 4px;
                font-size: 7px;
            }
        }
    </style>
</head>
<body>

    <div class="toast" id="toast">✅ Готово!</div>

    <!-- ===== АВТОРИЗАЦИЯ ===== -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-box">
            <h2 id="authTitle">🍎 Три в ряд</h2>
            <div class="auth-error" id="authError"></div>
            <div class="auth-success" id="authSuccess"></div>
            <div id="authExtraFields"></div>
            <button class="auth-btn-register" id="authSubmitBtn">Начать игру</button>
            <div class="auth-toggle" id="authToggle">Уже есть аккаунт? Войти</div>
        </div>
    </div>

    <!-- ===== МЕНЮ ===== -->
    <div class="game" id="menuContainer" style="display:none;">
        <button class="back-btn" id="backBtn">🏠 На главную</button>
        <div class="header">
            🍎 ТРИ В РЯД
            <span class="sub">👤 <span id="userNameDisplay">Гость</span></span>
        </div>
        <div class="menu-top">
            <div class="menu-stats">
                <div class="menu-stat"><span class="icon">⭐</span><span id="starsCount">0</span></div>
                <div class="menu-stat"><span class="icon">⚡</span><span id="energyCount">5</span><span class="sub-text">/5</span></div>
                <div class="menu-stat"><span class="icon">💡</span><span id="hintCount">3</span></div>
            </div>
            <div class="level-progress">
                <div class="level-info"><span id="levelDisplay">Уровень 1</span><span id="levelProgressText">0%</span></div>
                <div class="progress-bar"><div class="progress-fill" id="levelProgress" style="width:0%"></div></div>
            </div>
        </div>
        <div class="levels-grid" id="levelsContainer"></div>
        <div class="menu-actions">
            <button class="menu-btn primary" id="playBtn">🎮 Играть</button>
            <button class="menu-btn hint" id="hintBtn">💡 Подсказка</button>
            <button class=
