<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏰 Защита башни</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="toast" id="toast">✅ Готово!</div>

    <!-- ===== АВТОРИЗАЦИЯ ===== -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-box">
            <h2 id="authTitle">🏰 Вход в игру</h2>
            <div class="auth-error" id="authError"></div>
            <div class="auth-success" id="authSuccess"></div>
            <div id="authExtraFields"></div>
            <button class="auth-btn-login" id="authSubmitBtn">Войти</button>
            <div class="auth-toggle" id="authToggle">Нет аккаунта? Регистрация</div>
        </div>
    </div>

    <!-- ===== ИГРА ===== -->
    <div class="game" id="gameContainer">
        <button class="back-btn" id="backBtn">🏠 На главную</button>
        <div class="header">🏰 ЗАЩИТА БАШНИ</div>
        <div class="stats">
            <div class="stat-item">💰 <span id="money">50</span></div>
            <div class="stat-item">🌊 <span id="wave">0</span></div>
            <div class="stat-item">❤️ <span id="lives">5</span></div>
            <div class="stat-item">⚔️ <span id="kills">0</span></div>
        </div>
        <div class="canvas-wrap">
            <canvas id="gameCanvas"></canvas>
            <div class="wave-announce" id="waveAnnounce">🌊 ВОЛНА 1</div>
            <div class="game-over" id="gameOver">
                <div class="go-text" id="goText">💀 ПОРАЖЕНИЕ</div>
                <div class="go-score">💰 Монет: <span id="goMoney">0</span></div>
                <div class="go-score">🌊 Волн пройдено: <span id="goWaves">0</span></div>
                <div class="go-score">⚔️ Врагов убито: <span id="goKills">0</span></div>
                <button class="go-btn" id="restartBtn">🔄 Играть снова</button>
            </div>
        </div>
        <div class="tower-bar">
            <button class="tower-btn active" data-tower="0"><span class="temoji">🏹</span><span class="tname">Лучник</span><span class="tprice">20💰</span></button>
            <button class="tower-btn" data-tower="1"><span class="temoji">🔮</span><span class="tname">Маг</span><span class="tprice">35💰</span></button>
            <button class="tower-btn" data-tower="2"><span class="temoji">💥</span><span class="tname">Пушка</span><span class="tprice">50💰</span></button>
            <button class="tower-btn" data-tower="3"><span class="temoji">❄️</span><span class="tname">Ледяная</span><span class="tprice">70💰</span></button>
        </div>
        <div class="actions">
            <button class="action-btn gold" id="upgradeBtn">⬆️ Улучшить (15💰)</button>
            <button class="action-btn" id="sellBtn">💰 Продать (10💰)</button>
            <button class="action-btn red" id="resetBtn">🔄 Сброс</button>
        </div>
        <div class="footer" id="statusMsg">🏰 Строй башни и защищай свой сад!</div>
    </div>

    <script src="data.js"></script>
    <script src="auth.js"></script>
    <script src="draw.js"></script>
    <script src="game.js"></script>
    <script>
        // ================================================================
        //  ЗАПУСК
        // ================================================================

        // Функция для показа тоста
        window.showToast = function(msg, isError = false) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast' + (isError ? ' error' : '');
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2500);
        };

        // Переопределяем showToast для глобального доступа
        const origShowToast = window.showToast;
        window.showToast = origShowToast;

        // Проверяем, есть ли уже пользователь
        const user = getCurrentUser();
        if (user) {
            document.getElementById('authOverlay').classList.add('hidden');
            currentUser = user;
            initCanvas();
            startGame();
        } else {
            showAuthScreen('register');
        }

        console.log('🚀 Tower Defense загружена!');
    </script>
</body>
</html>
