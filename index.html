<script src="data.js"></script>
<script src="auth.js"></script>
<script src="levels.js"></script>
<script src="sounds.js"></script>
<script src="bonuses.js"></script>
<script src="drag.js"></script>
<script src="obstacles.js"></script>
<script src="animations.js"></script>
<script src="game.js"></script>
<script src="menu.js"></script>
<script>
    // ================================================================
    //  ЗАПУСК (АВТО-ГЕНЕРАЦИЯ ИМЕНИ)
    // ================================================================

    function initApp() {
        // Сначала проверяем, есть ли сохранённый пользователь
        const savedUser = getCurrentUser();
        if (savedUser) {
            const users = getUsers();
            if (users[savedUser]) {
                // Вход существующего пользователя
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('userNameDisplay').textContent = savedUser;
                document.getElementById('userName').textContent = savedUser;
                document.getElementById('menuContainer').style.display = 'flex';
                loadMenu();
                updateLevelDisplay();
                showToast(`👋 С возвращением, ${savedUser}!`, false);
                console.log('✅ Загружен пользователь:', savedUser);
                return;
            }
        }
        
        // Если пользователя нет — показываем экран входа
        document.getElementById('authOverlay').classList.remove('hidden');
        document.getElementById('authTitle').textContent = '🍎 Три в ряд';
        document.getElementById('authSubmitBtn').textContent = '🎮 Войти в игру';
        document.getElementById('authExtraFields').innerHTML = '';
        document.getElementById('authToggle').textContent = '';
        document.getElementById('authError').textContent = '';
        document.getElementById('authSuccess').textContent = '';
        console.log('❌ Пользователь не найден, показываем вход');
    }

    // ---- ЗАПУСК ----
    initApp();

    // ---- КНОПКИ ----
    document.getElementById('gameBackBtn').addEventListener('click', () => {
        if (isProcessing) return;
        document.getElementById('gameContainer').style.display = 'none';
        document.getElementById('menuContainer').style.display = 'flex';
        updateMenuUI();
        updateLevelDisplay();
    });

    document.getElementById('restartBtn').addEventListener('click', () => {
        document.getElementById('gameOver').classList.remove('active');
        startGame();
    });

    document.getElementById('logoutMenuBtn').addEventListener('click', () => {
        if (confirm('Выйти из аккаунта?')) {
            logoutUser();
            document.getElementById('authOverlay').classList.remove('hidden');
            document.getElementById('userNameDisplay').textContent = 'Гость';
            document.getElementById('userName').textContent = 'Гость';
            document.getElementById('menuContainer').style.display = 'none';
            document.getElementById('authTitle').textContent = '🍎 Нажми "Войти"';
            document.getElementById('authSubmitBtn').textContent = '🎮 Войти в игру';
            document.getElementById('authExtraFields').innerHTML = '';
            document.getElementById('authToggle').textContent = '';
        }
    });

    console.log('🍎 Три в ряд загружена!');
    console.log('👤 Текущий пользователь:', getCurrentUser() || 'Гость');
</script>
