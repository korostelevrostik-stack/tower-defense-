<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍎 Три в ряд</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="toast" id="toast">✅ Готово!</div>

    <!-- ===== АВТОРИЗАЦИЯ ===== -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-box">
            <h2 id="authTitle">🍎 Три в ряд</h2>
            <div class="auth-error" id="authError"></div>
            <div class="auth-success" id="authSuccess"></div>
            <div id="authExtraFields"></div>
            <button class="auth-btn-login" id="authSubmitBtn">Войти</button>
            <div class="auth-toggle" id="authToggle">Нет аккаунта? Регистрация</div>
        </div>
    </div>

    <!-- ===== ИГРА ===== -->
    <div class="game">
        <button class="back-btn" id="backBtn">🏠 На главную</button>
        <div class="header">
            🍎 ТРИ В РЯД
            <span class="sub">👤 <span id="userName">Гость</span></span>
        </div>
        <div class="stats">
            <div class="stat-item">🏆 Очки <span id="score">0</span></div>
            <div class="stat-item">👆 Ходов <span id="moves">0</span></div>
            <div class="stat-item">🏅 Рекорд <span id="highScore">0</span></div>
        </div>
        <div class="grid-wrap">
            <div class="grid" id="grid"></div>
        </div>
        <div class="btn-row">
            <button class="btn gold" id="newGameBtn">🔄 Новая игра</button>
            <button class="btn blue" id="shuffleBtn">🔀 Перемешать</button>
            <button class="btn red" id="resetBtn">🗑️ Сброс</button>
        </div>
        <div class="footer" id="statusMsg">🍎 Собирай комбинации из 3+ фруктов!</div>
    </div>

    <script src="data.js"></script>
    <script src="auth.js"></script>
    <script src="animations.js"></script>
    <script src="game.js"></script>
    <script>
        // ================================================================
        //  ЗАПУСК
        // ================================================================

        const user = getCurrentUser();
        if (user) {
            document.getElementById('authOverlay').classList.add('hidden');
            document.getElementById('userName').textContent = user;
            startGame();
        } else {
            document.getElementById('userName').textContent = 'Гость';
            showAuthScreen('register');
        }

        document.getElementById('resetBtn').addEventListener('click', () => {
            if (!confirm('Сбросить рекорд?')) return;
            const user = getCurrentUser();
            if (user) {
                saveHighScore(user, 0);
                highScore = 0;
                document.getElementById('highScore').textContent = '0';
                showToast('🔄 Рекорд сброшен!', true);
            }
        });

        console.log('🍎 Три в ряд загружена!');
    </script>
</body>
</html>
